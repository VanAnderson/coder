name: Jarvis Release To AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REPO_URL: ${{ secrets.ECR_CODER_REPOSITORY }}
        run: |
          TAG="${REPO_URL}:main-${GITHUB_SHA::12}"
          docker buildx imagetools create --tag "$TAG" ghcr.io/coder/coder:latest
          echo "image=$TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 via SSM
        env:
          DEPLOY_INSTANCE_ID: ${{ secrets.DEPLOY_INSTANCE_ID }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          COMMANDS=$(cat <<EOS
          set -eu
          cd /opt/jarvis-demo
          REGISTRY="${IMAGE%%/*}"
          aws ecr get-login-password --region "${AWS_REGION}" | sudo docker login --username AWS --password-stdin "\${REGISTRY}"
          sed -i "/^  coder:/,/^  [a-z0-9-]\\+:/ s|^\\s*image: .*|    image: ${IMAGE}|" docker-compose.yml
          sudo docker compose pull coder
          sudo docker compose up -d coder
          EOS
          )

          PAYLOAD=$(jq -cn --arg cmd "$COMMANDS" '{commands:[$cmd]}')
          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${DEPLOY_INSTANCE_ID}" \
            --parameters "$PAYLOAD" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "$COMMAND_ID" \
            --instance-id "${DEPLOY_INSTANCE_ID}"
